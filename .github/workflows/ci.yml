name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint

  test-backend:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      TESTCONTAINERS_RYUK_DISABLED: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test --workspace=backend

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test --workspace=frontend

  build:
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Configure insecure registry
        run: |
          echo '{ "insecure-registries": ["89.110.105.147:5000"] }' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            89.110.105.147:5000/fullkek-backend:${{ github.sha }}
            89.110.105.147:5000/fullkek-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            89.110.105.147:5000/fullkek-frontend:${{ github.sha }}
            89.110.105.147:5000/fullkek-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
